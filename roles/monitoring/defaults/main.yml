# =============================================================================
# Role: Monitoring - Default Variables
# =============================================================================

---
# Node Exporter
node_exporter_version: "1.7.0"
node_exporter_port: 9100
node_exporter_user: node_exporter
node_exporter_install_dir: /usr/local/bin
node_exporter_textfile_dir: /var/lib/node_exporter/textfile_collector
node_exporter_enabled_collectors:
  - systemd
  - processes
  - filesystem
node_exporter_disabled_collectors: []

# Promtail
promtail_version: "2.9.3"
promtail_port: 9080
promtail_config_dir: /etc/promtail
promtail_positions_dir: /var/lib/promtail
promtail_user: promtail

# Loki endpoint - set per environment
promtail_loki_url: "http://loki:3100/loki/api/v1/push"

# Log paths to scrape
promtail_scrape_configs:
  - job_name: syslog
    path: /var/log/syslog
    labels:
      job: syslog
      host: "{{ inventory_hostname }}"
  - job_name: auth
    path: /var/log/auth.log
    labels:
      job: auth
      host: "{{ inventory_hostname }}"
  - job_name: docker
    path: /var/lib/docker/containers/*/*-json.log
    labels:
      job: docker
      host: "{{ inventory_hostname }}"
