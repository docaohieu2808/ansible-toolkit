# =============================================================================
# Role: Monitoring - Handlers
# =============================================================================

---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Restart promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted
