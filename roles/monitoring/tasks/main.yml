# =============================================================================
# Role: Monitoring - Tasks (node_exporter + promtail)
# =============================================================================

---
# ---------------------------------------------------------------------------
# Node Exporter
# ---------------------------------------------------------------------------
- name: Create node_exporter system user
  user:
    name: "{{ node_exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create node_exporter textfile collector directory
  file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: '0755'

- name: Download node_exporter binary
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: Restart node_exporter

- name: Deploy node_exporter systemd service
  template:
    src: node-exporter-systemd.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Ensure node_exporter is started and enabled
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

# ---------------------------------------------------------------------------
# Promtail
# ---------------------------------------------------------------------------
- name: Create promtail system user
  user:
    name: "{{ promtail_user }}"
    system: yes
    shell: /usr/sbin/nologin
    groups: adm
    append: yes
    create_home: no

- name: Create promtail config and positions directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_user }}"
    mode: '0755'
  loop:
    - "{{ promtail_config_dir }}"
    - "{{ promtail_positions_dir }}"

- name: Download promtail binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: "/tmp/promtail-{{ promtail_version }}.zip"
    mode: '0644'

- name: Extract promtail binary
  unarchive:
    src: "/tmp/promtail-{{ promtail_version }}.zip"
    dest: /tmp/
    remote_src: yes

- name: Install promtail binary
  copy:
    src: /tmp/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: Restart promtail

- name: Deploy promtail configuration
  template:
    src: promtail-config.yml.j2
    dest: "{{ promtail_config_dir }}/config.yml"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_user }}"
    mode: '0640'
  notify: Restart promtail

- name: Deploy promtail systemd service
  template:
    src: promtail-systemd.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart promtail

- name: Ensure promtail is started and enabled
  systemd:
    name: promtail
    state: started
    enabled: yes
    daemon_reload: yes
