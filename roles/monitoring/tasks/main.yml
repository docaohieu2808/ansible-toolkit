# =============================================================================
# Role: Monitoring - Tasks (node_exporter + promtail)
# =============================================================================

---
# Map ansible_architecture to the go/release arch string used by upstream tarballs
- name: Set architecture map fact
  ansible.builtin.set_fact:
    _arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armv7'} [ansible_architecture] | default('amd64') }}"

# ---------------------------------------------------------------------------
# Node Exporter
# ---------------------------------------------------------------------------
- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create node_exporter textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: '0755'

- name: Download node_exporter binary
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ _arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}-{{ _arch }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}-{{ _arch }}.tar.gz"
    dest: /tmp/
    remote_src: yes

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ _arch }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: Restart node_exporter

- name: Deploy node_exporter systemd service
  ansible.builtin.template:
    src: node-exporter-systemd.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Ensure node_exporter is started and enabled
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

# ---------------------------------------------------------------------------
# Promtail
# ---------------------------------------------------------------------------
- name: Create promtail system user
  ansible.builtin.user:
    name: "{{ promtail_user }}"
    system: yes
    shell: /usr/sbin/nologin
    groups: adm
    append: yes
    create_home: no

- name: Create promtail config and positions directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_user }}"
    mode: '0755'
  loop:
    - "{{ promtail_config_dir }}"
    - "{{ promtail_positions_dir }}"

- name: Download promtail binary
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-{{ _arch }}.zip"
    dest: "/tmp/promtail-{{ promtail_version }}-{{ _arch }}.zip"
    mode: '0644'

- name: Extract promtail binary
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ promtail_version }}-{{ _arch }}.zip"
    dest: /tmp/
    remote_src: yes

- name: Install promtail binary
  ansible.builtin.copy:
    src: "/tmp/promtail-linux-{{ _arch }}"
    dest: /usr/local/bin/promtail
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: Restart promtail

- name: Deploy promtail configuration
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ promtail_config_dir }}/config.yml"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_user }}"
    mode: '0640'
  notify: Restart promtail

- name: Deploy promtail systemd service
  ansible.builtin.template:
    src: promtail-systemd.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart promtail

- name: Ensure promtail is started and enabled
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: yes
    daemon_reload: yes
