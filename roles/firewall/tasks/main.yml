# =============================================================================
# Role: Firewall - Tasks
# =============================================================================

---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes
  when: firewall_backend == 'ufw'

- name: Reset UFW rules
  community.general.ufw:
    state: reset
  when:
    - firewall_backend == 'ufw'
    - ufw_reset_on_apply | bool

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_default_incoming }}"
  when: firewall_backend == 'ufw'

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_default_outgoing }}"
  when: firewall_backend == 'ufw'

- name: Set UFW default routed policy
  community.general.ufw:
    direction: routed
    policy: "{{ ufw_default_routed }}"
  when: firewall_backend == 'ufw'

- name: Allow base UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ ufw_base_rules }}"
  when: firewall_backend == 'ufw'

- name: Allow extra UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    src: "{{ item.src | default(omit) }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ ufw_extra_rules }}"
  when: firewall_backend == 'ufw'

- name: Allow trusted networks
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
    comment: "Trusted network"
  loop: "{{ ufw_trusted_networks }}"
  when:
    - firewall_backend == 'ufw'
    - ufw_trusted_networks | length > 0

- name: Apply Docker UFW fix (prevent Docker bypassing UFW)
  ansible.builtin.blockinfile:
    path: /etc/ufw/after.rules
    marker: "# {mark} ANSIBLE MANAGED - Docker UFW fix"
    block: |
      *filter
      :DOCKER-USER - [0:0]
      :ufw-user-input - [0:0]
      -A DOCKER-USER -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
      -A DOCKER-USER -m conntrack --ctstate INVALID -j DROP
      -A DOCKER-USER -i eth0 -j ufw-user-input
      -A DOCKER-USER -i eth0 -j DROP
      COMMIT
  when:
    - firewall_backend == 'ufw'
    - ufw_docker_fix | bool
  notify: Reload UFW

- name: Set UFW logging level
  community.general.ufw:
    logging: "{{ ufw_logging }}"
  when: firewall_backend == 'ufw'

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_backend == 'ufw'
