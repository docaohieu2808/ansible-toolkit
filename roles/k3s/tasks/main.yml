# =============================================================================
# Role: K3s - Tasks
# =============================================================================

---
- name: Create K3s config directory
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy K3s config file
  ansible.builtin.template:
    src: k3s-server-config.yaml.j2
    dest: "{{ k3s_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: '0640'
  when: k3s_role == 'server'

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0750'

- name: Install K3s server (control plane)
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_TOKEN: "{{ k3s_token }}"
    INSTALL_K3S_EXEC: "server"
  args:
    creates: "{{ k3s_install_dir }}/k3s"
  when: k3s_role == 'server'
  notify: Restart K3s

- name: Install K3s agent (worker node)
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_TOKEN: "{{ k3s_token }}"
    K3S_URL: "{{ k3s_server_url }}"
    INSTALL_K3S_EXEC: "agent"
  args:
    creates: "{{ k3s_install_dir }}/k3s"
  when: k3s_role == 'agent'
  notify: Restart K3s agent

- name: Ensure K3s server service is started and enabled
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: yes
  when: k3s_role == 'server'

- name: Ensure K3s agent service is started and enabled
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: yes
  when: k3s_role == 'agent'

- name: Wait for K3s node to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  retries: 20
  delay: 10
  until: k3s_nodes.rc == 0
  changed_when: false
  when: k3s_role == 'server'

- name: Set kubeconfig permissions
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: "{{ k3s_kubeconfig_mode }}"
  when: k3s_role == 'server'

- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ k3s_local_kubeconfig_path }}"
    flat: yes
  when:
    - k3s_role == 'server'
    - k3s_copy_kubeconfig_to_local | bool
