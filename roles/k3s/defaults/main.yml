# =============================================================================
# Role: K3s - Default Variables
# =============================================================================

---
k3s_version: "v1.29.2+k3s1"
k3s_install_dir: /usr/local/bin
k3s_config_dir: /etc/rancher/k3s
k3s_data_dir: /var/lib/rancher/k3s

# Deployment mode: server (control plane) or agent (worker)
k3s_role: server

# Server options
k3s_server_args: ""
k3s_cluster_init: false        # Set true for first node in HA cluster
k3s_server_url: ""             # For agent nodes: https://<server-ip>:6443
k3s_token: ""                  # Cluster join token - set in vault

# Networking
k3s_flannel_backend: "vxlan"   # vxlan, wireguard-native, none (for Cilium/Calico)
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"
k3s_cluster_dns: "10.43.0.10"

# Disable bundled components (set to true to disable)
k3s_disable_traefik: false
k3s_disable_servicelb: false
k3s_disable_local_storage: false

# TLS SANs - IPs/hostnames to add to k3s TLS cert
k3s_tls_san: []
# Example:
# k3s_tls_san:
#   - 10.0.0.1
#   - k3s.example.com

# Kubeconfig
k3s_kubeconfig_mode: "0644"
k3s_copy_kubeconfig_to_local: false
k3s_local_kubeconfig_path: "~/.kube/config"
