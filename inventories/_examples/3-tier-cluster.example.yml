# =============================================================================
# 3-Tier Cluster Inventory Example
# =============================================================================
# Pattern: load balancer + app cluster + database cluster
# =============================================================================

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3
    timezone: UTC

  children:
    loadbalancer:
      hosts:
        lb01:
          ansible_host: 203.0.113.10

    app_cluster:
      hosts:
        app01:
          ansible_host: 203.0.113.20
        app02:
          ansible_host: 203.0.113.21

    database_cluster:
      hosts:
        db01:
          ansible_host: 203.0.113.30
          patroni_role: primary
        db02:
          ansible_host: 203.0.113.31
          patroni_role: replica
